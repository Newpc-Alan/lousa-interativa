<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lousa Interativa Premium | Portal do Educador</title>
<style>
  :root{
    --verde:#1a6b2a;
    --verde-claro:#2d8f42;
    --azul:#0f2c4a;
    --azul-claro:#1a4a73;
    --texto:#e8eef4;
    --borda:rgba(255,255,255,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:"Segoe UI",Roboto,sans-serif;}
  body{display:flex;flex-direction:column;background:#e9eef2;}

  /* área principal: lateral + palco lado a lado */
  #area{flex:1;display:flex;min-height:0;}

  /* ===== Barra lateral esquerda (ferramentas de desenho) ===== */
  #lateral{
    width:56px;flex:none;background:var(--azul);
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:8px 4px;overflow-y:auto;overflow-x:hidden;
    box-shadow:2px 0 12px rgba(0,0,0,.25);z-index:9;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.3) transparent;
  }
  #lateral::-webkit-scrollbar{width:5px;}
  #lateral::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px;}
  .marca-lat{display:flex;align-items:center;justify-content:center;padding:2px 0 6px;}
  .marca-lat .dot{width:12px;height:12px;border-radius:50%;background:var(--verde-claro);box-shadow:0 0 8px var(--verde-claro);}
  .sep-lat{width:34px;height:1px;background:var(--borda);margin:3px 0;flex:none;}

  /* ===== Palco (área da lousa) ===== */
  #palco{flex:1;position:relative;overflow:hidden;min-width:0;}
  #tela{position:absolute;inset:0;}

  /* ===== Barra inferior ===== */
  #barra{
    background:var(--azul);
    color:var(--texto);
    display:flex;align-items:center;gap:6px;
    padding:8px 12px;flex-wrap:nowrap;
    overflow-x:auto;overflow-y:hidden;
    box-shadow:0 -2px 14px rgba(0,0,0,.30);
    z-index:10;user-select:none;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.3) transparent;
  }
  /* barra de rolagem discreta (aparece só se precisar rolar) */
  #barra::-webkit-scrollbar{height:6px;}
  #barra::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px;}
  #barra::-webkit-scrollbar-track{background:transparent;}

  #marca{
    display:flex;align-items:center;gap:8px;
    font-weight:700;font-size:14px;letter-spacing:.3px;
    padding-right:12px;margin-right:2px;flex:none;
    border-right:1px solid var(--borda);white-space:nowrap;
  }
  #marca .dot{width:10px;height:10px;border-radius:50%;background:var(--verde-claro);box-shadow:0 0 8px var(--verde-claro);}

  .grupo{display:flex;align-items:center;gap:4px;padding:0 8px;border-right:1px solid var(--borda);flex:none;}
  .grupo:last-child{border-right:none;}

  .ferr{
    min-width:40px;height:40px;border:none;border-radius:8px;
    background:transparent;color:var(--texto);
    cursor:pointer;font-size:18px;padding:0 8px;flex:none;
    display:flex;align-items:center;justify-content:center;gap:5px;
    transition:background .15s,transform .1s;white-space:nowrap;
  }
  .ferr small{font-size:12px;font-weight:600;}
  .ferr:hover{background:rgba(255,255,255,.10);}
  .ferr:active{transform:scale(.92);}
  .ferr.ativa{background:var(--verde);box-shadow:0 0 0 2px var(--verde-claro) inset;}
  .ferr:disabled{opacity:.35;cursor:not-allowed;}

  .cor{
    width:26px;height:26px;border-radius:50%;
    border:2px solid rgba(255,255,255,.35);cursor:pointer;
    transition:transform .12s;flex:none;
  }
  .cor:hover{transform:scale(1.15);}
  .cor.ativa{border-color:#fff;box-shadow:0 0 0 2px var(--verde-claro);transform:scale(1.1);}

  #espessura{width:80px;accent-color:var(--verde-claro);cursor:pointer;flex:none;}
  .rotulo{font-size:11px;opacity:.7;white-space:nowrap;}

  #rodape-dir{margin-left:auto;display:flex;align-items:center;gap:12px;padding-left:8px;flex:none;}
  #info{font-size:12px;opacity:.65;white-space:nowrap;}
  #logo-newpc{height:26px;width:auto;display:block;opacity:.95;}

  select.campo{
    background:var(--azul-claro);color:var(--texto);
    border:1px solid var(--borda);border-radius:7px;
    height:34px;padding:0 8px;font-size:13px;cursor:pointer;flex:none;
  }

  /* contexto de seleção (aparece só quando há objeto selecionado) */
  #ctxsel{display:none;}
  #ctxsel.show{display:flex;}

  input[type=file]{display:none;}

  /* ===== BARRA ADAPTATIVA (C + A) =====
     Conforme a tela estreita, esconde textos longos para caber mais.
     Se ainda assim não couber, a barra rola na horizontal (nunca quebra). */

  /* abaixo de 1100px: esconde os textos dos botões de ação (Salvar, Imagem) */
  @media (max-width:1100px){
    .ferr small{display:none;}
    .rotulo{display:none;}
  }
  /* abaixo de 900px: compacta espaçamentos e o nome da marca */
  @media (max-width:900px){
    #barra{gap:3px;padding:8px;}
    .grupo{padding:0 5px;gap:3px;}
    #marca span{display:none;}
    #info{display:none;}
    #espessura{width:60px;}
  }
  /* abaixo de 860px: botões e cores menores para caber mais no toque */
  @media (max-width:860px){
    .ferr{min-width:36px;height:36px;font-size:16px;padding:0 5px;}
    .cor{width:22px;height:22px;}
    #logo-newpc{height:22px;}
  }
</style>
</head>
<body>

<div id="area">
  <!-- BARRA LATERAL ESQUERDA: ferramentas de desenho -->
  <div id="lateral">
    <div class="marca-lat"><span class="dot"></span></div>
    <button class="ferr" data-tool="select" title="Selecionar e mover (V)">🖱️</button>
    <button class="ferr ativa" data-tool="caneta" title="Caneta livre (P)">✏️</button>
    <button class="ferr" data-tool="marcatexto" title="Marca-texto (M)">🖍️</button>
    <button class="ferr" data-tool="laser" title="Ponteiro laser (some sozinho)">🔴</button>
    <div class="sep-lat"></div>
    <button class="ferr" data-tool="linha" title="Linha (L)">📏</button>
    <button class="ferr" data-tool="seta" title="Seta (A)">➤</button>
    <button class="ferr" data-tool="retangulo" title="Retângulo (R)">▭</button>
    <button class="ferr" data-tool="circulo" title="Círculo (C)">◯</button>
    <button class="ferr" data-tool="triangulo" title="Triângulo">△</button>
    <div class="sep-lat"></div>
    <button class="ferr" data-tool="texto" title="Texto (T)">🔤</button>
    <button class="ferr" data-tool="postit" title="Post-it">🗒️</button>
    <button class="ferr" id="btnAuto" data-action="autoforma" title="Forma perfeita: desenhe solto e o traço vira forma geométrica">✨</button>
  </div>

  <!-- PALCO -->
  <div id="palco">
    <canvas id="tela"></canvas>
  </div>
</div>

<!-- BARRA INFERIOR: cores, traço, fundo, páginas, ações -->
<div id="barra">
  <div id="marca"><span class="dot"></span><span>Lousa Premium</span></div>

  <!-- Cores -->
  <div class="grupo" id="cores"></div>

  <!-- Espessura -->
  <div class="grupo">
    <span class="rotulo">Traço</span>
    <input type="range" id="espessura" min="1" max="40" value="4">
  </div>

  <!-- Fundo -->
  <div class="grupo">
    <select id="fundo" class="campo" title="Fundo da lousa">
      <option value="branco">Fundo branco</option>
      <option value="escuro">Quadro escuro</option>
      <option value="verde">Quadro verde</option>
      <option value="pautado">Pautado</option>
      <option value="caligrafia">Caligrafia</option>
      <option value="quadriculado">Quadriculado</option>
      <option value="cartesiano">Plano cartesiano</option>
      <option value="musica">Pauta musical</option>
    </select>
  </div>

  <!-- Inserir imagem -->
  <div class="grupo">
    <button class="ferr" data-action="imagem" title="Inserir imagem">🖼️<small>Imagem</small></button>
  </div>

  <!-- Seleção (contextual) -->
  <div class="grupo" id="ctxsel">
    <button class="ferr" data-action="frente" title="Trazer para frente">⬆️</button>
    <button class="ferr" data-action="tras" title="Enviar para trás">⬇️</button>
    <button class="ferr" data-action="duplicar" title="Duplicar">⧉</button>
    <button class="ferr" data-action="excluir" title="Excluir (Del)">🗑️</button>
  </div>

  <!-- Páginas -->
  <div class="grupo">
    <button class="ferr" data-action="pag-ant" title="Página anterior">◀</button>
    <span class="rotulo" id="pagInfo" style="min-width:64px;text-align:center;">Pág 1/1</span>
    <button class="ferr" data-action="pag-prox" title="Próxima página">▶</button>
    <button class="ferr" data-action="pag-nova" title="Nova página">➕</button>
    <button class="ferr" data-action="pag-del" title="Excluir página atual">➖</button>
  </div>

  <!-- Histórico -->
  <div class="grupo">
    <button class="ferr" id="btnDesfazer" data-action="desfazer" title="Desfazer (Ctrl+Z)">↶</button>
    <button class="ferr" id="btnRefazer" data-action="refazer" title="Refazer (Ctrl+Y)">↷</button>
  </div>

  <!-- Limpar + salvar -->
  <div class="grupo">
    <button class="ferr" data-action="limpar" title="Limpar tudo">🧹</button>
    <button class="ferr" data-action="png" title="Salvar em PNG (uma imagem por página)">💾<small>Salvar em PNG</small></button>
    <button class="ferr" data-action="pdf" title="Salvar em PDF (todas as páginas em um arquivo)">📕<small>Salvar em PDF</small></button>
  </div>

  <div id="rodape-dir">
    <span id="info"></span>
    <img id="logo-newpc" alt="NEWPC" />
  </div>
</div>

<input type="file" id="fileImg" accept="image/*">

<script>
(function(){
  "use strict";

  var palco   = document.getElementById("palco");
  var info     = document.getElementById("info");
  var rangeEsp = document.getElementById("espessura");
  var selFundo = document.getElementById("fundo");
  var fileImg  = document.getElementById("fileImg");
  var ctxsel   = document.getElementById("ctxsel");
  var btnUndo  = document.getElementById("btnDesfazer");
  var btnRedo  = document.getElementById("btnRefazer");
  var pagInfo  = document.getElementById("pagInfo");

  var CORES = ["#0f2c4a","#1a6b2a","#d92b2b","#1565c0","#f2a900","#7b1fa2","#000000","#ffffff"];

  var estado = {
    ferramenta:"select",
    cor:"#0f2c4a",
    espessura:4,
    desenhando:false,
    obj:null,
    x0:0, y0:0,
    autoforma:false
  };

  /* ---------- canvas Fabric ---------- */
  var canvas = new fabric.Canvas("tela", {
    backgroundColor:"#ffffff",
    selection:true,
    preserveObjectStacking:true
  });

  function ajustarTamanho(){
    var r = palco.getBoundingClientRect();
    canvas.setWidth(r.width);
    canvas.setHeight(r.height);
    desenharFundo();
    canvas.renderAll();
  }
  window.addEventListener("resize", ajustarTamanho);

  /* ---------- paleta de cores ---------- */
  var divCores = document.getElementById("cores");
  CORES.forEach(function(c,i){
    var b = document.createElement("button");
    b.className = "cor" + (i===0?" ativa":"");
    b.style.background = c;
    b.dataset.cor = c;
    divCores.appendChild(b);
  });

  /* ================= HISTÓRICO (undo/redo) ================= */
  var pilha = [];
  var redo  = [];
  var trancado = false;
  var LIM = 40;

  function snap(){
    if(trancado) return;
    try{
      var json = JSON.stringify(canvas.toDatalessJSON(["selectable","tipoFundo"]));
      pilha.push(json);
      if(pilha.length > LIM) pilha.shift();
      redo = [];
      attHistBotoes();
    }catch(e){}
  }
  function carregar(json, cb){
    trancado = true;
    canvas.loadFromJSON(json, function(){
      canvas.renderAll();
      trancado = false;
      attHistBotoes();
      if(cb) cb();
    });
  }
  function desfazer(){
    if(pilha.length < 2) return;
    redo.push(pilha.pop());
    carregar(pilha[pilha.length-1]);
    msg("Desfeito");
  }
  function refazer(){
    if(!redo.length) return;
    var j = redo.pop();
    pilha.push(j);
    carregar(j);
    msg("Refeito");
  }
  function attHistBotoes(){
    btnUndo.disabled = pilha.length < 2;
    btnRedo.disabled = redo.length === 0;
  }

  canvas.on("object:added",   function(){ snap(); });
  canvas.on("object:modified",function(){ snap(); });
  canvas.on("object:removed", function(){ snap(); });

  /* ================= PÁGINAS ================= */
  /* cada página = { json: <conteúdo>, fundo: <tipo> } */
  var paginas = [];
  var pagAtual = 0;

  function estadoPaginaAtual(){
    return {
      json: JSON.stringify(canvas.toDatalessJSON(["selectable","evented"])),
      fundo: selFundo.value
    };
  }

  function attPagInfo(){
    pagInfo.textContent = "Pág " + (pagAtual+1) + "/" + paginas.length;
  }

  function irParaPagina(idx){
    if(idx < 0 || idx >= paginas.length) return;
    // salva a página que estamos saindo
    paginas[pagAtual] = estadoPaginaAtual();
    pagAtual = idx;
    var p = paginas[pagAtual];
    selFundo.value = p.fundo || "branco";
    trancado = true;
    canvas.loadFromJSON(p.json, function(){
      desenharFundo();
      canvas.renderAll();
      trancado = false;
      // reinicia histórico da nova página
      pilha = [JSON.stringify(canvas.toDatalessJSON(["selectable","evented"]))];
      redo = [];
      attHistBotoes();
      setFerramenta(estado.ferramenta);
    });
    attPagInfo();
  }

  function novaPagina(){
    paginas[pagAtual] = estadoPaginaAtual();
    paginas.splice(pagAtual+1, 0, {json: JSON.stringify({version:"5.3.0",objects:[]}), fundo: selFundo.value});
    irParaPagina(pagAtual+1);
    msg("Nova página criada");
  }

  function excluirPagina(){
    if(paginas.length <= 1){ msg("Não dá para excluir a única página"); return; }
    if(!confirm("Excluir a página atual? Pode ser desfeito apenas recriando.")) return;
    paginas.splice(pagAtual, 1);
    if(pagAtual >= paginas.length) pagAtual = paginas.length-1;
    // força recarga da página destino
    var p = paginas[pagAtual];
    selFundo.value = p.fundo || "branco";
    trancado = true;
    canvas.loadFromJSON(p.json, function(){
      desenharFundo(); canvas.renderAll(); trancado = false;
      pilha = [JSON.stringify(canvas.toDatalessJSON(["selectable","evented"]))];
      redo = []; attHistBotoes(); setFerramenta(estado.ferramenta);
    });
    attPagInfo();
    msg("Página excluída");
  }

  /* mostra/esconde o grupo de seleção */
  function attCtxSel(){
    var alvo = canvas.getActiveObject();
    ctxsel.classList.toggle("show", !!alvo);
  }
  canvas.on("selection:created", attCtxSel);
  canvas.on("selection:updated", attCtxSel);
  canvas.on("selection:cleared", attCtxSel);

  /* ================= FUNDOS ================= */
  function desenharFundo(){
    var tipo = selFundo.value;
    var w = canvas.getWidth(), h = canvas.getHeight();
    var c = document.createElement("canvas");
    c.width = w; c.height = h;
    var x = c.getContext("2d");

    // cor de base de cada fundo
    var corFundo = "#ffffff";
    if(tipo==="escuro") corFundo = "#13202b";
    else if(tipo==="verde") corFundo = "#0f5132";   // verde quadro-negro
    x.fillStyle = corFundo;
    x.fillRect(0,0,w,h);

    // cor das linhas conforme o fundo (claras sobre quadro, escuras sobre branco)
    var escuroBg = (tipo==="escuro" || tipo==="verde");
    var linha = escuroBg ? "rgba(255,255,255,.20)" : "rgba(15,44,74,.14)";

    if(tipo==="pautado"){
      x.strokeStyle = linha; x.lineWidth = 1;
      for(var y=40; y<h; y+=40){ x.beginPath(); x.moveTo(0,y); x.lineTo(w,y); x.stroke(); }

    }else if(tipo==="caligrafia"){
      // blocos de 3 linhas (teto, meio tracejado, base) + margem vermelha
      var bloco = 60;          // altura de cada conjunto
      var corBase = escuroBg ? "rgba(255,255,255,.55)" : "rgba(15,44,74,.45)";
      var corMeio = escuroBg ? "rgba(255,255,255,.30)" : "rgba(15,44,74,.25)";
      for(var by=bloco; by<h; by+=bloco){
        // linha de teto
        x.strokeStyle = corBase; x.lineWidth = 1;
        x.beginPath(); x.moveTo(0,by-30); x.lineTo(w,by-30); x.stroke();
        // linha do meio (tracejada) - onde a letra minúscula encosta
        x.strokeStyle = corMeio; x.lineWidth = 1;
        x.setLineDash([6,6]);
        x.beginPath(); x.moveTo(0,by-15); x.lineTo(w,by-15); x.stroke();
        x.setLineDash([]);
        // linha de base (mais forte)
        x.strokeStyle = corBase; x.lineWidth = 1.6;
        x.beginPath(); x.moveTo(0,by); x.lineTo(w,by); x.stroke();
      }
      // margem vermelha à esquerda
      x.strokeStyle = "rgba(217,43,43,.55)"; x.lineWidth = 1.4;
      x.beginPath(); x.moveTo(60,0); x.lineTo(60,h); x.stroke();

    }else if(tipo==="quadriculado"){
      x.strokeStyle = linha; x.lineWidth = 1;
      for(var gx=40; gx<w; gx+=40){ x.beginPath(); x.moveTo(gx,0); x.lineTo(gx,h); x.stroke(); }
      for(var gy=40; gy<h; gy+=40){ x.beginPath(); x.moveTo(0,gy); x.lineTo(w,gy); x.stroke(); }

    }else if(tipo==="cartesiano"){
      x.strokeStyle = linha; x.lineWidth = 1;
      for(var cx=40; cx<w; cx+=40){ x.beginPath(); x.moveTo(cx,0); x.lineTo(cx,h); x.stroke(); }
      for(var cy=40; cy<h; cy+=40){ x.beginPath(); x.moveTo(0,cy); x.lineTo(w,cy); x.stroke(); }
      x.strokeStyle = escuroBg ? "#7fd1ff" : "#0f2c4a"; x.lineWidth = 2;
      x.beginPath(); x.moveTo(0,h/2); x.lineTo(w,h/2); x.stroke();
      x.beginPath(); x.moveTo(w/2,0); x.lineTo(w/2,h); x.stroke();

    }else if(tipo==="musica"){
      // pautas de 5 linhas, repetidas pela tela
      var corPauta = escuroBg ? "rgba(255,255,255,.55)" : "rgba(15,44,74,.55)";
      var espLinha = 12;        // espaço entre as 5 linhas
      var espPauta = espLinha*5 + 40; // espaço entre uma pauta e a próxima
      x.strokeStyle = corPauta; x.lineWidth = 1;
      for(var py=50; py+espLinha*4 < h; py+=espPauta){
        for(var k=0;k<5;k++){
          var ly = py + k*espLinha;
          x.beginPath(); x.moveTo(20,ly); x.lineTo(w-20,ly); x.stroke();
        }
        // barra inicial da pauta
        x.beginPath(); x.moveTo(20,py); x.lineTo(20,py+espLinha*4); x.stroke();
      }
    }

    canvas.setBackgroundColor({source:c.toDataURL(), repeat:"no-repeat"}, canvas.renderAll.bind(canvas));
  }
  selFundo.addEventListener("change", function(){ desenharFundo(); msg("Fundo: "+selFundo.options[selFundo.selectedIndex].text); });

  /* ================= FERRAMENTAS ================= */
  function setFerramenta(t){
    estado.ferramenta = t;
    document.querySelectorAll("[data-tool]").forEach(function(b){
      b.classList.toggle("ativa", b.dataset.tool===t);
    });
    var livre = (t==="caneta" || t==="marcatexto" || t==="laser");
    canvas.isDrawingMode = livre;
    if(livre){
      canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
      if(t==="caneta"){
        canvas.freeDrawingBrush.color = estado.cor;
        canvas.freeDrawingBrush.width = estado.espessura;
      }else if(t==="marcatexto"){
        // traço grosso e translúcido, igual marca-texto de verdade
        canvas.freeDrawingBrush.color = corComAlfa(estado.cor, 0.35);
        canvas.freeDrawingBrush.width = Math.max(14, estado.espessura*4);
      }else if(t==="laser"){
        // vermelho vivo; o traço some sozinho (tratado em path:created)
        canvas.freeDrawingBrush.color = "rgba(220,30,30,0.9)";
        canvas.freeDrawingBrush.width = Math.max(4, estado.espessura);
      }
    }
    canvas.selection = (t==="select");
    canvas.forEachObject(function(o){ o.selectable = (t==="select"); o.evented = (t==="select"); });
    canvas.defaultCursor = (t==="select") ? "default" : "crosshair";
    if(t!=="select") canvas.discardActiveObject().renderAll();
  }

  function corComAlfa(hex, a){
    var h = hex.replace("#","");
    if(h.length===3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
    return "rgba("+r+","+g+","+b+","+a+")";
  }

  /* criação de formas por arraste */
  canvas.on("mouse:down", function(opt){
    if(estado.ferramenta==="select" || estado.ferramenta==="caneta") return;
    var p = canvas.getPointer(opt.e);
    estado.desenhando = true;
    estado.x0 = p.x; estado.y0 = p.y;

    var t = estado.ferramenta, o = null;
    if(t==="retangulo"){
      o = new fabric.Rect({left:p.x,top:p.y,width:0,height:0,fill:"transparent",stroke:estado.cor,strokeWidth:estado.espessura});
    }else if(t==="circulo"){
      o = new fabric.Ellipse({left:p.x,top:p.y,rx:0,ry:0,fill:"transparent",stroke:estado.cor,strokeWidth:estado.espessura});
    }else if(t==="triangulo"){
      o = new fabric.Triangle({left:p.x,top:p.y,width:0,height:0,fill:"transparent",stroke:estado.cor,strokeWidth:estado.espessura});
    }else if(t==="linha" || t==="seta"){
      o = new fabric.Line([p.x,p.y,p.x,p.y],{stroke:estado.cor,strokeWidth:estado.espessura});
    }else if(t==="texto"){
      estado.desenhando = false;
      var it = new fabric.IText("Digite...",{left:p.x,top:p.y,fill:estado.cor,fontFamily:"Segoe UI, sans-serif",fontSize:Math.max(18,estado.espessura*6)});
      canvas.add(it).setActiveObject(it);
      it.enterEditing(); it.selectAll();
      setFerramenta("select");
      return;
    }else if(t==="postit"){
      estado.desenhando = false;
      criarPostit(p.x,p.y);
      setFerramenta("select");
      return;
    }
    if(o){ estado.obj=o; o.selectable=false; o.evented=false; canvas.add(o); }
  });

  canvas.on("mouse:move", function(opt){
    if(!estado.desenhando || !estado.obj) return;
    var p = canvas.getPointer(opt.e);
    var o = estado.obj, t = estado.ferramenta;
    if(t==="retangulo" || t==="triangulo"){
      o.set({ width:Math.abs(p.x-estado.x0), height:Math.abs(p.y-estado.y0),
              left:Math.min(p.x,estado.x0), top:Math.min(p.y,estado.y0) });
    }else if(t==="circulo"){
      o.set({ rx:Math.abs(p.x-estado.x0)/2, ry:Math.abs(p.y-estado.y0)/2,
              left:Math.min(p.x,estado.x0), top:Math.min(p.y,estado.y0) });
    }else if(t==="linha" || t==="seta"){
      o.set({ x2:p.x, y2:p.y });
    }
    canvas.renderAll();
  });

  canvas.on("mouse:up", function(){
    if(!estado.desenhando) return;
    estado.desenhando = false;
    var o = estado.obj, t = estado.ferramenta;
    estado.obj = null;
    if(!o) return;

    // descarta clique sem arraste (objeto vazio)
    if((o.width===0 && o.height===0 && !o.x2) ){ canvas.remove(o); return; }

    if(t==="seta"){ // troca a linha por um grupo linha+ponta
      var grupo = montarSeta(o);
      canvas.remove(o);
      canvas.add(grupo);
      o = grupo;
    }
    o.selectable = true; o.evented = true;
    snap();
  });

  function montarSeta(linha){
    var x1=linha.x1, y1=linha.y1, x2=linha.x2, y2=linha.y2;
    var ang = Math.atan2(y2-y1, x2-x1);
    var tam = 8 + estado.espessura*2;
    var p1 = new fabric.Line([x2,y2, x2-tam*Math.cos(ang-Math.PI/6), y2-tam*Math.sin(ang-Math.PI/6)],{stroke:estado.cor,strokeWidth:estado.espessura});
    var p2 = new fabric.Line([x2,y2, x2-tam*Math.cos(ang+Math.PI/6), y2-tam*Math.sin(ang+Math.PI/6)],{stroke:estado.cor,strokeWidth:estado.espessura});
    var corpo = new fabric.Line([x1,y1,x2,y2],{stroke:estado.cor,strokeWidth:estado.espessura});
    return new fabric.Group([corpo,p1,p2]);
  }

  function criarPostit(x,y){
    var fundo = new fabric.Rect({width:160,height:120,rx:6,ry:6,fill:"#fff7b0",stroke:"#e0c84a",strokeWidth:1,
      shadow:new fabric.Shadow({color:"rgba(0,0,0,.25)",blur:8,offsetX:2,offsetY:3})});
    var txt = new fabric.Textbox("Nota...",{width:140,left:10,top:12,fontSize:18,fill:"#5a4b00",fontFamily:"Segoe UI, sans-serif"});
    var g = new fabric.Group([fundo,txt],{left:x,top:y});
    canvas.add(g).setActiveObject(g);
  }

  /* ================= RECONHECIMENTO DE FORMAS (Forma perfeita) ================= */
  /*
    Estratégia (geometria, não IA):
    - extrai os pontos do traço livre criado pela caneta
    - fechado (início ~ fim) -> conta cantos: 0=círculo, 3=triângulo, 4=retângulo
    - aberto e quase reto -> linha
    - se não reconhece com confiança, mantém o traço livre original
  */
  canvas.on("path:created", function(ev){
    var path = ev.path;

    // LASER: traço temporário, some depois de ~1,2s com fade
    if(estado.ferramenta==="laser"){
      path.selectable = false; path.evented = false;
      path.excludeFromExport = true;
      var op = 0.9;
      var fade = setInterval(function(){
        op -= 0.08;
        if(op <= 0){
          clearInterval(fade);
          canvas.remove(path);
          canvas.renderAll();
        }else{
          path.set("opacity", op);
          canvas.renderAll();
        }
      }, 90);
      return;
    }

    // MARCA-TEXTO: manda pro fundo para não cobrir o que já está escrito
    if(estado.ferramenta==="marcatexto"){
      canvas.sendToBack(path);
      canvas.renderAll();
      return;
    }

    if(!estado.autoforma) return;
    var pts = extrairPontos(path);
    if(pts.length < 6) return; // traço curto demais, ignora

    var forma = reconhecer(pts);
    if(!forma) return; // não reconheceu: deixa o traço livre

    forma.set({stroke:estado.cor, strokeWidth:estado.espessura, fill:"transparent"});
    canvas.remove(path);
    canvas.add(forma);
    canvas.setActiveObject(forma);
    canvas.renderAll();
    msg("Forma reconhecida: " + forma._rotulo);
  });

  function extrairPontos(path){
    // path.path = array de comandos tipo ["M",x,y],["L",x,y],["Q",x,y,x,y]...
    var pts = [];
    (path.path || []).forEach(function(cmd){
      if(cmd.length >= 3){
        var x = cmd[cmd.length-2], y = cmd[cmd.length-1];
        if(typeof x==="number" && typeof y==="number") pts.push({x:x,y:y});
      }
    });
    return pts;
  }

  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

  function bbox(pts){
    var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    pts.forEach(function(p){
      if(p.x<minX)minX=p.x; if(p.y<minY)minY=p.y;
      if(p.x>maxX)maxX=p.x; if(p.y>maxY)maxY=p.y;
    });
    return {minX:minX,minY:minY,maxX:maxX,maxY:maxY,w:maxX-minX,h:maxY-minY};
  }

  function comprimento(pts){
    var t=0; for(var i=1;i<pts.length;i++) t+=dist(pts[i-1],pts[i]); return t;
  }

  function reconhecer(pts){
    var ini = pts[0], fim = pts[pts.length-1];
    var b = bbox(pts);
    var diag = Math.hypot(b.w,b.h);
    if(diag < 20) return null; // muito pequeno

    var fechado = dist(ini,fim) < diag*0.25;
    var perim = comprimento(pts);

    // ---- ABERTO: testa linha reta ----
    if(!fechado){
      var distDireta = dist(ini,fim);
      // se o caminho real é quase igual à reta direta, é uma linha
      if(distDireta > 0 && perim/distDireta < 1.15){
        var ln = new fabric.Line([ini.x,ini.y,fim.x,fim.y]);
        ln._rotulo = "linha"; return ln;
      }
      return null;
    }

    // ---- FECHADO: conta cantos ----
    var cantos = contarCantos(pts);

    // círculo: forma fechada com poucos/nenhum canto e proporção equilibrada
    var razao = b.w / (b.h||1);
    if(cantos <= 1 && razao > 0.5 && razao < 2.0){
      var raioMedio = (b.w + b.h)/4;
      var circ = new fabric.Circle({
        left:b.minX, top:b.minY, radius:raioMedio,
        scaleX: b.w/(raioMedio*2), scaleY: b.h/(raioMedio*2)
      });
      circ._rotulo = "círculo"; return circ;
    }

    if(cantos === 3){
      var tri = new fabric.Triangle({left:b.minX, top:b.minY, width:b.w, height:b.h});
      tri._rotulo = "triângulo"; return tri;
    }

    if(cantos === 4 || cantos === 5){
      var rect = new fabric.Rect({left:b.minX, top:b.minY, width:b.w, height:b.h});
      rect._rotulo = "retângulo"; return rect;
    }

    return null; // indeciso: mantém o traço livre
  }

  function contarCantos(pts){
    // reamostra e mede mudança de ângulo entre segmentos; pico = canto
    var amostra = reamostrar(pts, 24);
    var cantos = 0;
    var limiar = Math.PI/4; // 45 graus
    for(var i=1;i<amostra.length-1;i++){
      var a = amostra[i-1], c = amostra[i], d = amostra[i+1];
      var ang1 = Math.atan2(c.y-a.y, c.x-a.x);
      var ang2 = Math.atan2(d.y-c.y, d.x-c.x);
      var dif = Math.abs(ang2-ang1);
      if(dif > Math.PI) dif = 2*Math.PI - dif;
      if(dif > limiar) cantos++;
    }
    return cantos;
  }

  function reamostrar(pts, n){
    var total = comprimento(pts);
    if(total === 0) return pts.slice();
    var passo = total/n;
    var saida = [pts[0]];
    var acum = 0, i = 1, atual = pts[0];
    while(i < pts.length && saida.length < n){
      var d = dist(atual, pts[i]);
      if(acum + d >= passo){
        var t = (passo-acum)/d;
        var novo = {x: atual.x + (pts[i].x-atual.x)*t, y: atual.y + (pts[i].y-atual.y)*t};
        saida.push(novo); atual = novo; acum = 0;
      }else{ acum += d; atual = pts[i]; i++; }
    }
    return saida;
  }

  /* ================= AÇÕES ================= */
  function inserirImagem(file){
    if(!file) return;
    msg("Carregando imagem...");
    var reader = new FileReader();
    reader.onerror = function(){ msg("Erro ao ler a imagem"); };
    reader.onload = function(ev){
      var imgTmp = new Image();
      imgTmp.onload = function(){
        // comprime imagens grandes (fotos de celular) para não travar a memória
        var LIM = 1600;
        var src = ev.target.result;
        if(imgTmp.width > LIM || imgTmp.height > LIM){
          var esc = LIM / Math.max(imgTmp.width, imgTmp.height);
          var nw = Math.round(imgTmp.width * esc);
          var nh = Math.round(imgTmp.height * esc);
          var cc = document.createElement("canvas");
          cc.width = nw; cc.height = nh;
          cc.getContext("2d").drawImage(imgTmp, 0, 0, nw, nh);
          src = cc.toDataURL("image/jpeg", 0.85);
        }
        fabric.Image.fromURL(src, function(img){
          var max = Math.min(canvas.getWidth(), canvas.getHeight()) * 0.6;
          if(img.width > max || img.height > max){
            img.scale(max / Math.max(img.width, img.height));
          }
          img.set({left:canvas.getWidth()/2, top:canvas.getHeight()/2, originX:"center", originY:"center"});
          canvas.add(img).setActiveObject(img);
          canvas.renderAll();
          msg("Imagem inserida");
        });
      };
      imgTmp.onerror = function(){ msg("Arquivo de imagem inválido"); };
      imgTmp.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
  fileImg.addEventListener("change", function(){ if(this.files[0]){ inserirImagem(this.files[0]); this.value=""; } });

  function excluirSel(){
    var objs = canvas.getActiveObjects();
    if(!objs.length) return;
    objs.forEach(function(o){ canvas.remove(o); });
    canvas.discardActiveObject().renderAll();
    msg("Excluído");
  }
  function duplicarSel(){
    var alvo = canvas.getActiveObject();
    if(!alvo) return;
    alvo.clone(function(c){
      c.set({left:alvo.left+20, top:alvo.top+20});
      canvas.add(c).setActiveObject(c);
      canvas.renderAll();
    });
  }
  function limparTudo(){
    if(!confirm("Limpar toda a lousa? Pode ser desfeito.")) return;
    canvas.getObjects().slice().forEach(function(o){ canvas.remove(o); });
    canvas.discardActiveObject().renderAll();
    msg("Lousa limpa");
  }
  function carimboData(){
    var d = new Date();
    return d.getFullYear() + ("0"+(d.getMonth()+1)).slice(-2) + ("0"+d.getDate()).slice(-2) +
           "_" + ("0"+d.getHours()).slice(-2) + ("0"+d.getMinutes()).slice(-2);
  }

  function baixarPNG(dataURL, nome){
    var a = document.createElement("a");
    a.download = nome;
    a.href = dataURL;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function exportarPNG(){
    canvas.discardActiveObject().renderAll();

    // salva o estado da página atual antes de percorrer
    paginas[pagAtual] = estadoPaginaAtual();
    var totalPag = paginas.length;
    var carimbo = carimboData();

    // uma só página: exporta direto (comportamento simples)
    if(totalPag === 1){
      baixarPNG(canvas.toDataURL({format:"png", multiplier:2}), "lousa_" + carimbo + ".png");
      msg("PNG exportado");
      return;
    }

    msg("Exportando " + totalPag + " páginas...");

    // canvas Fabric temporário (fora da tela) para renderizar cada página
    var elTmp = document.createElement("canvas");
    elTmp.width = canvas.getWidth();
    elTmp.height = canvas.getHeight();
    var cTmp = new fabric.StaticCanvas(elTmp, {
      width: canvas.getWidth(),
      height: canvas.getHeight()
    });

    var i = 0;
    function proxima(){
      if(i >= totalPag){
        cTmp.dispose();
        msg("Exportadas " + totalPag + " páginas");
        return;
      }
      var p = paginas[i];
      cTmp.setBackgroundColor("#ffffff", function(){});
      cTmp.loadFromJSON(p.json, function(){
        cTmp.renderAll();
        var nome = "lousa_" + carimbo + "_pag" + (i+1) + ".png";
        baixarPNG(cTmp.toDataURL({format:"png", multiplier:2}), nome);
        i++;
        // pequeno intervalo evita que o navegador bloqueie downloads em sequência
        setTimeout(proxima, 400);
      });
    }
    proxima();
  }

  function exportarPDF(){
    // jsPDF é exposto como window.jspdf.jsPDF
    var JsPDF = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : null;
    if(!JsPDF){ msg("Gerador de PDF não carregou"); return; }

    canvas.discardActiveObject().renderAll();
    paginas[pagAtual] = estadoPaginaAtual();
    var totalPag = paginas.length;
    var carimbo = carimboData();

    var w = canvas.getWidth(), h = canvas.getHeight();
    var orient = (w >= h) ? "landscape" : "portrait";
    var pdf = new JsPDF({ orientation: orient, unit: "px", format: [w, h] });

    msg("Gerando PDF...");

    var elTmp = document.createElement("canvas");
    elTmp.width = w; elTmp.height = h;
    var cTmp = new fabric.StaticCanvas(elTmp, { width: w, height: h });

    var i = 0;
    function proxima(){
      if(i >= totalPag){
        cTmp.dispose();
        pdf.save("lousa_" + carimbo + ".pdf");
        msg("PDF salvo: " + totalPag + " página(s)");
        return;
      }
      var p = paginas[i];
      cTmp.setBackgroundColor("#ffffff", function(){});
      cTmp.loadFromJSON(p.json, function(){
        cTmp.renderAll();
        var img = cTmp.toDataURL({ format: "jpeg", quality: 0.92 });
        if(i > 0) pdf.addPage([w, h], orient);
        pdf.addImage(img, "JPEG", 0, 0, w, h);
        i++;
        proxima();
      });
    }
    proxima();
  }
  function handlerBarra(e){
    var bT = e.target.closest("[data-tool]");
    var bA = e.target.closest("[data-action]");
    var bC = e.target.closest(".cor");

    if(bT){ setFerramenta(bT.dataset.tool); msg("Ferramenta: "+bT.title.split(" (")[0]); return; }
    if(bC){
      estado.cor = bC.dataset.cor;
      document.querySelectorAll(".cor").forEach(function(b){ b.classList.remove("ativa"); });
      bC.classList.add("ativa");
      if(canvas.isDrawingMode) canvas.freeDrawingBrush.color = estado.cor;
      var alvo = canvas.getActiveObject();
      if(alvo){
        if(alvo.type==="i-text" || alvo.type==="textbox") alvo.set("fill", estado.cor);
        else if(alvo.stroke!==undefined && alvo.stroke!==null) alvo.set("stroke", estado.cor);
        else alvo.set("fill", estado.cor);
        canvas.renderAll(); snap();
      }
      return;
    }
    if(bA){
      var a = bA.dataset.action;
      if(a==="imagem")   fileImg.click();
      if(a==="autoforma"){
        estado.autoforma = !estado.autoforma;
        document.getElementById("btnAuto").classList.toggle("ativa", estado.autoforma);
        if(estado.autoforma){
          setFerramenta("caneta");
          msg("Forma perfeita ON: desenhe solto, o traço vira forma");
        }else{
          msg("Forma perfeita OFF");
        }
      }
      if(a==="pag-ant")  irParaPagina(pagAtual-1);
      if(a==="pag-prox") irParaPagina(pagAtual+1);
      if(a==="pag-nova") novaPagina();
      if(a==="pag-del")  excluirPagina();
      if(a==="excluir")  excluirSel();
      if(a==="duplicar") duplicarSel();
      if(a==="frente"){  var f=canvas.getActiveObject(); if(f){ canvas.bringToFront(f); snap(); } }
      if(a==="tras"){    var t=canvas.getActiveObject(); if(t){ canvas.sendToBack(t); snap(); } }
      if(a==="desfazer") desfazer();
      if(a==="refazer")  refazer();
      if(a==="limpar")   limparTudo();
      if(a==="png")      exportarPNG();
      if(a==="pdf")      exportarPDF();
    }
  }
  document.getElementById("barra").addEventListener("click", handlerBarra);
  document.getElementById("lateral").addEventListener("click", handlerBarra);

  rangeEsp.addEventListener("input", function(){
    estado.espessura = parseInt(this.value,10);
    if(canvas.isDrawingMode) canvas.freeDrawingBrush.width = estado.espessura;
    var alvo = canvas.getActiveObject();
    if(alvo && alvo.stroke){ alvo.set("strokeWidth", estado.espessura); canvas.renderAll(); }
  });

  /* ================= ATALHOS ================= */
  document.addEventListener("keydown", function(e){
    var editando = canvas.getActiveObject() && canvas.getActiveObject().isEditing;
    if(editando) return;

    if(e.ctrlKey || e.metaKey){
      if(e.key==="z"){ e.preventDefault(); desfazer(); return; }
      if(e.key==="y"){ e.preventDefault(); refazer(); return; }
    }
    if(e.key==="Delete" || e.key==="Backspace"){ excluirSel(); return; }

    var mapa = {v:"select",p:"caneta",m:"marcatexto",l:"linha",a:"seta",r:"retangulo",c:"circulo",t:"texto"};
    var f = mapa[e.key.toLowerCase()];
    if(f){ var b=document.querySelector('[data-tool="'+f+'"]'); if(b) b.click(); }
  });

    info.textContent = t;
    clearTimeout(timer);
    timer = setTimeout(function(){ info.textContent=""; }, 2000);
  }
